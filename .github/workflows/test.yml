name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run LP function tests
        run: python -m pytest tests/test_lp_functions.py -v --tb=short

      - name: Run solver tests
        run: python -m pytest tests/test_solver_numpy.py -v --tb=short

      - name: Run accuracy tests
        run: python -m pytest tests/test_accuracy.py -v --tb=short

      - name: Run paper validation tests
        run: python -m pytest tests/test_paper_validation.py -v --tb=short
